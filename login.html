<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBarter - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>SkillBarter</h1>
                <p>Exchange Skills, Learn Together</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" id="loginTab">Login</button>
                <button class="tab-btn" id="signupTab">Sign Up</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <input type="email" id="loginEmail" required>
                    <label>Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" required>
                    <label>Password</label>
                </div>
                <button type="submit" class="auth-btn" id="loginBtn">Login</button>
            </form>

            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <input type="text" id="signupName" required>
                    <label>Full Name</label>
                </div>
                <div class="input-group">
                    <input type="email" id="signupEmail" required>
                    <label>Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="signupPassword" required>
                    <label>Password</label>
                </div>
                <button type="submit" class="auth-btn" id="signupBtn">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="login.js"></script>
</body>
</html>
